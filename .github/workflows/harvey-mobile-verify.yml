name: Harvey Mobile Verify
# Cloud-only validation for the canonical Harvey Mobile package.

on:
  push:
    branches:
      - codex/cloud-harvey-mobile-vpg-20260715
    paths:
      - "Harvey/Werkles Mobile/mobile-app/**"
      - "Harvey/Werkles Mobile/docs/harvey-flock/**"
      - "Harvey/Werkles Mobile/scripts/harvey-flock-*.mjs"
      - ".github/workflows/harvey-mobile-verify.yml"
  pull_request:
    paths:
      - "Harvey/Werkles Mobile/mobile-app/**"
      - "Harvey/Werkles Mobile/docs/harvey-flock/**"
      - "Harvey/Werkles Mobile/scripts/harvey-flock-*.mjs"
      - ".github/workflows/harvey-mobile-verify.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Lint, test, typecheck, and Android export
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: "Harvey/Werkles Mobile/mobile-app"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify passive Harvey Flock relay contract
        run: node ../scripts/verify-harvey-flock.mjs

      - name: Install mobile dependencies
        run: npm install --no-audit --no-fund

      - name: Lint Harvey Mobile
        run: npm run lint

      - name: Run Harvey Mobile contract tests
        run: npm test

      - name: Typecheck Harvey Mobile
        run: npm run typecheck

      - name: Export Android bundle smoke artifact
        run: npm run export:android

      - name: Upload Android bundle smoke artifact (not an APK)
        uses: actions/upload-artifact@v4
        with:
          name: harvey-mobile-android-bundle-not-apk
          path: Harvey/Werkles Mobile/mobile-app/dist/android
          if-no-files-found: error
          retention-days: 7
