          "receipt": {
            "$ref": "#/components/schemas/Receipt"
          },
          "friction_state": {
            "$ref": "#/components/schemas/FrictionState"
          },
          "would_mutate_live_state": {
            "type": "boolean",
            "const": false
          },
          "live_execution": {
            "type": "boolean",
            "const": false
          },
          "staged_actions": {
            "type": "array",
