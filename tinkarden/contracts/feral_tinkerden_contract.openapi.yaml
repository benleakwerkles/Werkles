          "message",
          "status",
          "receipt_id"
        ],
        "properties": {
          "error": {
            "type": "string",
            "minLength": 1
          },
          "message": {
            "type": "string",
            "minLength": 1
          },
          "status": {
            "type": "integer",
            "minimum": 400
          },
          "receipt_id": {
            "type": [
              "string",
              "null"
            ]
          }
        }
      }
    }
  }
