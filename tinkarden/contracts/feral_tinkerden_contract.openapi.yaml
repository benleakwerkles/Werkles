{
  "openapi": "3.1.0",
  "info": {
    "title": "Feral/TinkerDen Contract Surface",
    "version": "0.1.0",
    "description": "Contract-only surface for BIRD #002 dry-run, shadow-merge, and immutable receipt lookup. This artifact defines no live execution path."
  },
  "servers": [
    {
      "url": "contract://feral-tinkerden",
      "description": "Contract-only target. No live service is bound by this artifact."
    }
  ],
  "x-artifact": {
    "packet_id": "DINK_SALLY_FERAL_TINKERDEN_CONTRACT_SURFACE_V0_2026_06_26",
    "owner": "Dink@Sally",
    "stream": "FERAL / TINKERDEN / CONTRACT SURFACE",
    "bird": "BIRD #002"
  },
  "x-safety-invariants": {
    "dry_run_mutates_live_state": false,
    "shadow_merge_requires_prior_dry_run_receipt": true,
    "receipt_get_returns_immutable_data": true,
    "destructive_actions_remain_staged_unless_receipt_trail_exists": true,
    "silent_live_promotion_allowed": false,
    "operator_path_live_semantics_allowed": false,
    "autonomous_action_scoring_allowed": false,
    "live_execution_allowed": false
  },
  "x-ui-event-block-field-mapping": {
    "event_block_id": {
      "api_schema": "Intent",
      "api_field": "event_block_id"
    },
    "event_block_kind": {
      "api_schema": "Intent",
      "api_field": "kind"
    },
    "event_block_label": {
      "api_schema": "Intent",
      "api_field": "label"
    },
    "event_block_payload": {
      "api_schema": "Intent",
      "api_field": "payload"
    },
    "requested_action": {
      "api_schema": "Action",
      "api_field": "kind"
    },
    "action_target": {
      "api_schema": "Action",
      "api_field": "target"
    },
    "destructive": {
      "api_schema": "Action",
      "api_field": "destructive"
    },
